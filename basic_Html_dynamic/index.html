        <input type="text" placeholder="Add Your To Do Here">

    <script>
        function addToDo(){
            const inputElement = document.querySelector("input");
            const value = inputElement.value;
            console.log(value)
        }

        function deleteRandomToDo(){
            const element = document.getElementById('todo');
            const parentElement = element.parentNode;
            parentElement.removeChild(element);
        }
        
        let sec = 0;
        function callBack(){
            document.getElementById('todo').innerHTML = sec + '. Timer Onn';
            sec = sec + 1; 
        }
        setInterval(callBack, 1000);
        

        const docEl = document.createElement("div");
        docEl.innerHTML = "hi there";
        console.log(docEl.innerHTML);
        document.querySelector("body").appendChild(docEl)
        
    </script>
</body>
