<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zerodha</title>
</head>
<body style="font-family: 'Inter', serif;">
    <div style="padding-left: 50px; padding-right: 50px; 
    display: flex; justify-content: space-between; 
    padding-top: 20px; padding-bottom: 20px;box-shadow: 2px 1px 2px #eee">
        <div>
            <img src="logo.svg" alt="zerodha logo" style="width: 170px;
            position: relative;">
        </div>
        
        <div style="display: flex; justify-content: space-between; color: #666;">
            <div style="padding-right: 20px; cursor: pointer;">Signup</div>
            <div style="padding-right: 20px; cursor: pointer;">About</div>
            <div style="padding-right: 20px; cursor: pointer;">Products</div>
            <div style="padding-right: 20px; cursor: pointer;">Pricing</div>
            <div style="padding-right: 20px; cursor: pointer;">Support</div>
        </div>
    </div>

    <div style="display: flex; justify-content: center;
    padding-top: 30px; width: 1100px; max-width: 100%;
    margin: auto;">
        <img src="photo.png" alt=" zerodha photo" style="width: 100%;
        height: 80%;
        border-radius: 10px;">
    </div>

    <div style="padding-top: 30px; display: flex; 
    justify-content: center;
    color: #424242;">
        <h1 style="font-weight: 300;">Invest in everything</h1>
    </div>
    <div style="display: flex; justify-content: center;
    color: #424242">
        <p style="font-weight: 250;">Online platform to invest in stocks, derivatives, mutual funds, ETFs, bonds, and more.</p>
    </div>

    <div style="display: flex; justify-content: center;">
        <div style="background-color: #387ed1; 
            color: white; padding: 10px; 
            margin-top: 20px; 
            cursor: pointer;
            border-radius: 4px;
            font-weight: 500;
            font-size: 1.2em">Sign up for free
        </div>
    </div>
</body>
</html>
